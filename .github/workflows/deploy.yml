name: Deploy to GitHub Pages

on:
  push:
    branches: [main, v2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve GitHub Pages base path
        env:
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: |
          if [ -n "$PAGES_BASE_PATH" ]; then
            if [ "${PAGES_BASE_PATH#/}" = "$PAGES_BASE_PATH" ]; then
              PAGES_BASE_PATH="/$PAGES_BASE_PATH"
            fi
            if [ "${PAGES_BASE_PATH%/}" = "$PAGES_BASE_PATH" ]; then
              PAGES_BASE_PATH="$PAGES_BASE_PATH/"
            fi
            echo "VITE_BASE_PATH=$PAGES_BASE_PATH" >> "$GITHUB_ENV"
            exit 0
          fi

          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"
          if [ "$REPO_NAME" = "${OWNER_NAME}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${REPO_NAME}/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_PRESENCE_WORKER_URL: https://gp.hrfuqiang.top/presence

      - name: Inject custom domain (optional)
        if: ${{ vars.PAGES_CNAME != '' }}
        run: printf '%s\n' "${{ vars.PAGES_CNAME }}" > dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
