name = "fund-manager-telegram-ai-reminder"
main = "src/index.ts"
compatibility_date = "2026-04-04"
workers_dev = true

# 北京时间工作日 15:30，Cloudflare Cron 使用 UTC。
[triggers]
crons = ["30 7 * * 1-5"]

[dev]
port = 8789

# 非敏感默认配置可放在这里；密钥请使用 wrangler secret put。
[vars]
GIST_FILENAME = "fund-manager-sync.json"
AI_PROVIDER = "customOpenAi"
AI_MODE = "deep"
AI_QUESTION = "请基于最新持仓数据做一次收盘后持仓复盘，重点说明组合表现、主要风险、机会和下一步观察清单。"
MARKET_ANALYSIS_ENABLED = "true"
MARKET_INDEX_CODES = "sh000001,sz399001,sz399006,sh000300,sh000016,sh000905,sh000852,sh000688"
NEWS_ANALYSIS_ENABLED = "true"
NEWS_PROVIDER = "mixed"
NEWS_LOOKBACK_HOURS = "72"
NEWS_MAX_ITEMS = "12"
NEWS_QUERY_TIMEOUT_MS = "5000"
